name: cbt
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.1.1
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.1
  shared_preferences: ^2.5.3
  http: ^1.5.0
  intl: ^0.20.2
  sqflite: ^2.4.2
  path: ^1.9.1
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.0
  permission_handler: ^12.0.1
  media_scanner: ^2.2.0
  pdf: ^3.11.3
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  flutter_dotenv: ^6.0.0
  showcaseview: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/walkthrough/
    - .env

# ================= APP ICON =================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

# ================= SPLASH SCREEN =================
flutter_native_splash:
  color: "#f6f6fb"   # matches your app background (can change if you want)
  image: assets/icon/icon.png

  android_12:
    color: "#E5E4E2"
    image: assets/icon/icon.png
